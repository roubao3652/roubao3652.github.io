<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣诞快乐，温新</title>
    <!-- 使用内联字体图标，避免网络依赖 -->
    <style>
        /* 字体图标备用 */
        .fas {
            font-family: 'Font Awesome 6 Free', Arial, sans-serif;
            font-weight: 900;
        }

        /* 如果没有加载字体，使用Unicode字符替代 */
        .fa-heart:before { content: "❤"; }
        .fa-star:before { content: "★"; }
        .fa-camera:before { content: "📷"; }
        .fa-download:before { content: "↓"; }
        .fa-music:before { content: "♪"; }
        .fa-pause:before { content: "⏸"; }
        .fa-trash:before { content: "×"; }
        .fa-gift:before { content: "🎁"; }
        .fa-chevron-left:before { content: "←"; }
        .fa-chevron-right:before { content: "→"; }
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2e38 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .snowflakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 20px 0 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff6b8b;
            text-shadow: 0 0 10px rgba(255, 107, 139, 0.7);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a8e6cf;
            margin-bottom: 15px;
        }

        .heart-icon {
            color: #ff6b8b;
            animation: heartbeat 1.5s infinite;
            margin: 0 8px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            margin: 20px auto 40px;
        }

        .tree-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tree-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tree {
            position: relative;
            width: 250px;
            height: 350px;
        }

        .tree-trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 60px;
            background: #8B4513;
            border-radius: 5px;
        }

        .tree-layer {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 100px solid #2e8b57;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tree-layer:nth-child(2) {
            bottom: 140px;
            border-bottom-color: #3cb371;
            border-left-width: 70px;
            border-right-width: 70px;
            border-bottom-width: 90px;
        }

        .tree-layer:nth-child(3) {
            bottom: 210px;
            border-bottom-color: #4caf50;
            border-left-width: 60px;
            border-right-width: 60px;
            border-bottom-width: 80px;
        }

        .tree-layer:nth-child(4) {
            bottom: 270px;
            border-bottom-color: #66bb6a;
            border-left-width: 50px;
            border-right-width: 50px;
            border-bottom-width: 70px;
        }

        .tree-star {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            color: gold;
            font-size: 3rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        .ornament {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: red;
            z-index: 5;
            animation: twinkle 2s infinite;
            cursor: pointer;
        }

        .ornament:nth-child(5) { top: 50px; left: 50%; background: #ff6b8b; animation-delay: 0.2s; }
        .ornament:nth-child(6) { top: 100px; left: 40%; background: #ffcc00; animation-delay: 0.5s; }
        .ornament:nth-child(7) { top: 100px; right: 40%; background: #00ccff; animation-delay: 0.8s; }
        .ornament:nth-child(8) { top: 160px; left: 45%; background: #ff6b8b; animation-delay: 1.1s; }
        .ornament:nth-child(9) { top: 160px; right: 45%; background: #cc66ff; animation-delay: 1.4s; }
        .ornament:nth-child(10) { top: 220px; left: 50%; background: #00ff99; animation-delay: 1.7s; }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        .heart-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .heart-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.2;
        }

        .heart-shape:before,
        .heart-shape:after {
            position: absolute;
            content: "";
            left: 200px;
            top: 0;
            width: 200px;
            height: 320px;
            background: rgba(255, 107, 139, 0.2);
            border-radius: 200px 200px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-shape:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .photo-frame {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 107, 139, 0.9);
            transition: all 0.4s ease;
            z-index: 5;
            transform-origin: center;
            cursor: pointer;
        }

        .photo-frame:hover {
            transform: scale(1.3);
            z-index: 20;
            box-shadow: 0 0 25px rgba(255, 107, 139, 1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .photo-frame:hover img {
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 40px;
            flex-wrap: wrap;
            position: relative;
            z-index: 100;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .btn-upload {
            background: linear-gradient(to right, #ff6b8b, #ff8e53);
            color: white;
        }

        .btn-save {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .btn-music {
            background: linear-gradient(to right, #9d50bb, #6e48aa);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin: 20px auto 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .message-box h2 {
            color: #a8e6cf;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .message-content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0f7fa;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .signature {
            text-align: right;
            margin-top: 15px;
            font-style: italic;
            color: #ffccbc;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #a8e6cf;
            font-size: 0.9rem;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instructions {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 图片放大模态框样式 */
        .photo-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .photo-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: modalZoomIn 0.3s ease;
        }

        @keyframes modalZoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-image {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 107, 139, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .modal-close {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #ff6b8b;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, transform 0.2s ease;
            z-index: 10000;
            border: none;
        }

        .modal-close:hover {
            background: #ff416c;
            transform: scale(1.1);
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(-50%);
            z-index: 10000;
        }

        .nav-btn {
            background: rgba(255, 107, 139, 0.8);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            border: none;
        }

        .nav-btn:hover {
            background: rgba(255, 107, 139, 1);
            transform: scale(1.1);
        }

        .modal-info {
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            max-width: 80%;
        }

        .modal-index {
            font-size: 1rem;
            color: #a8e6cf;
            margin-top: 5px;
        }

        /* 响应式设计 - 针对小屏幕手机优化 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                max-width: 100%;
                overflow-x: hidden;
            }

            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
                padding: 0 10px;
            }

            .main-content {
                flex-direction: column;
                gap: 30px;
                margin: 10px auto 20px;
                width: 100%;
                align-items: center;
            }

            .tree-section, .photo-section {
                width: 100%;
                min-width: 100%;
            }

            .tree {
                width: 180px;
                height: 250px;
            }

            .tree-layer {
                border-left-width: 55px;
                border-right-width: 55px;
                border-bottom-width: 75px;
            }

            .tree-layer:nth-child(2) {
                bottom: 110px;
                border-left-width: 45px;
                border-right-width: 45px;
                border-bottom-width: 65px;
            }

            .tree-layer:nth-child(3) {
                bottom: 160px;
                border-left-width: 35px;
                border-right-width: 35px;
                border-bottom-width: 55px;
            }

            .tree-layer:nth-child(4) {
                bottom: 210px;
                border-left-width: 25px;
                border-right-width: 25px;
                border-bottom-width: 45px;
            }

            .tree-star {
                font-size: 2.2rem;
            }

            .heart-container {
                width: 320px;
                height: 300px;
                margin: 0 auto;
                position: relative;
                left: 0;
                transform: none;
            }

            .heart-shape:before,
            .heart-shape:after {
                left: 160px;
                width: 160px;
                height: 250px;
            }

            .photo-frame {
                width: 48px;
                height: 48px;
                border-width: 2px;
            }

            #photosContainer {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                transform: none !important;
                transform-origin: center;
            }

            .controls {
                margin: 20px 0 30px;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding-top: 20px;
                position: relative;
                z-index: 100;
            }

            .btn {
                width: 90%;
                max-width: 300px;
                justify-content: center;
                padding: 10px 20px;
                font-size: 0.95rem;
            }

            .message-box {
                padding: 20px 15px;
                margin: 15px auto 20px;
                width: 100%;
            }

            .message-box h2 {
                font-size: 1.5rem;
            }

            .message-content {
                font-size: 1rem;
            }

            .modal-content {
                max-width: 95%;
                max-height: 85%;
            }

            .modal-image {
                max-height: 65vh;
            }

            .modal-close {
                width: 35px;
                height: 35px;
                font-size: 1.3rem;
                top: -10px;
                right: -10px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }

            .modal-info {
                font-size: 1rem;
                max-width: 90%;
            }
        }

        /* 针对超小屏幕手机（iPhone SE等） */
        @media (max-width: 375px) {
            h1 {
                font-size: 1.6rem;
            }

            .heart-container {
                width: 280px;
                height: 260px;
            }

            .heart-shape:before,
            .heart-shape:after {
                left: 140px;
                width: 140px;
                height: 220px;
            }

            .photo-frame {
                width: 40px;
                height: 40px;
                border-width: 2px;
            }

            #photosContainer {
                transform: none !important;
            }

            .tree {
                width: 160px;
                height: 220px;
            }

            .tree-layer {
                border-left-width: 50px;
                border-right-width: 50px;
                border-bottom-width: 70px;
            }

            .tree-layer:nth-child(2) {
                border-left-width: 40px;
                border-right-width: 40px;
                border-bottom-width: 60px;
            }

            .tree-layer:nth-child(3) {
                border-left-width: 30px;
                border-right-width: 30px;
                border-bottom-width: 50px;
            }

            .tree-layer:nth-child(4) {
                border-left-width: 20px;
                border-right-width: 20px;
                border-bottom-width: 40px;
            }

            .heart-shape:before,
            .heart-shape:after {
                width: 120px;
                height: 200px;
                left: 140px;
            }
        }
    </style>
</head>
<body>
<!-- 雪花效果 -->
<div class="snowflakes" id="snowflakes"></div>

<div class="container">
    <header>
        <h1>圣诞快乐，温新 <i class="fas fa-heart heart-icon"></i></h1>
        <p class="subtitle">这个圣诞节，我的心里只有你</p>
        <p class="instructions">点击照片可以放大查看噢</p>
    </header>

    <div class="main-content">
        <div class="tree-section">
            <div class="tree-container">
                <div class="tree">
                    <div class="tree-trunk"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="tree-star">
                        <i class="fas fa-star"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-section">
            <div class="heart-container">
                <div class="heart-shape"></div>
                <div class="photos-container" id="photosContainer">
                    <!-- 照片将由JavaScript动态添加 -->
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-upload" id="uploadBtn">
            <i class="fas fa-camera"></i> 上传照片 (可多选)
        </button>
<!--        <button class="btn btn-save" id="savePage">-->
<!--            <i class="fas fa-download"></i> 保存此页面-->
<!--        </button>-->
        <button class="btn btn-music" id="musicToggle">
            <i class="fas fa-music"></i> 播放音乐
        </button>
        <button class="btn btn-clear" id="clearBtn">
            <i class="fas fa-trash"></i> 清空照片
        </button>
    </div>

    <div class="message-box">
        <h2><i class="fas fa-gift"></i> 致我最爱的你</h2>
        <div class="message-content">
            <p>亲爱的温新，在这个充满温馨和喜悦的圣诞节，我想对你说：</p>
            <p>你就像我生命中的圣诞礼物，每一天都带给我惊喜与快乐。和你在一起的每一刻，都如同圣诞树上闪烁的灯光，照亮我的世界。</p>
            <p>愿这个圣诞节，我们的爱如圣诞树般常青，如星光般永恒。未来的每一个圣诞节，我都希望与你一同度过。</p>
            <p>你是我最想要的圣诞礼物，是我生命中最美的奇迹。</p>
        </div>
        <div class="signature">
            <p>永远爱你的，<br>你的刘鑫</p>
        </div>
    </div>

</div>

<!-- 图片放大模态框 -->
<div class="photo-modal" id="photoModal">
    <div class="modal-nav">
        <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="modal-content">
        <button class="modal-close" id="closeModal">&times;</button>
        <img class="modal-image" id="modalImage" src="" alt="放大的照片">
        <div class="modal-info">
            <div id="modalCaption">温新的照片</div>
            <div class="modal-index" id="modalIndex"></div>
        </div>
    </div>
</div>

<!-- 音频播放器（隐藏） -->
<audio id="christmasMusic" loop>
    <source src="1.mp3" type="audio/mpeg">
</audio>

<script>
    // 等待页面完全加载
    document.addEventListener('DOMContentLoaded', function() {
        console.log('页面已加载，开始初始化...');

        // 爱心形状位置计算
        function calculateHeartPositions(numPhotos, containerWidth, containerHeight) {
            const positions = [];
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            const isMobile = window.innerWidth <= 768;
            const scale = Math.min(containerWidth, containerHeight) * (isMobile ? 0.28 : 0.35);

            for (let i = 0; i < numPhotos; i++) {
                const t = (i / numPhotos) * 2 * Math.PI;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const scaledX = centerX - x * (scale / 16);
                const scaledY = centerY - y * (scale / 16);

                positions.push({
                    x: scaledX,
                    y: scaledY
                });
            }

            return positions;
        }

        // 本地默认图片文件名
        const localDefaultPhotos = [
            'images/1.jpg', 'images/2.jpg', 'images/3.jpg', 'images/4.jpg',
            'images/5.jpg', 'images/6.jpg', 'images/7.jpg', 'images/8.jpg',
            'images/9.jpg', 'images/10.jpg', 'images/11.jpg', 'images/12.jpg'
        ];

        // 图片数据存储
        let photoData = [];
        let currentPhotoIndex = 0;

        // 获取DOM元素
        const photoModal = document.getElementById('photoModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');
        const modalIndex = document.getElementById('modalIndex');
        const closeModal = document.getElementById('closeModal');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // 初始化爱心照片位置
        function initHeartPhotos() {
            const photosContainer = document.getElementById('photosContainer');
            const heartContainer = document.querySelector('.heart-container');

            // 获取容器实际尺寸
            const containerWidth = heartContainer.offsetWidth;
            const containerHeight = heartContainer.offsetHeight;

            // 根据容器尺寸计算位置
            const heartPositions = calculateHeartPositions(12, containerWidth, containerHeight);

            // 清除现有的照片
            photosContainer.innerHTML = '';
            photoData = [];

            // 根据屏幕宽度动态调整照片框大小
            const isMobile = window.innerWidth <= 768;
            let photoSize;
            if (window.innerWidth <= 320) {
                photoSize = 36;
            } else if (window.innerWidth <= 375) {
                photoSize = 40;
            } else if (isMobile) {
                photoSize = 48;
            } else {
                photoSize = 80;
            }

            const photoOffset = photoSize / 2;

            // 添加照片框
            heartPositions.forEach((pos, index) => {
                const photoFrame = document.createElement('div');
                photoFrame.className = 'photo-frame';
                photoFrame.style.width = `${photoSize}px`;
                photoFrame.style.height = `${photoSize}px`;
                photoFrame.style.left = `${pos.x - photoOffset}px`;
                photoFrame.style.top = `${pos.y - photoOffset}px`;

                // 添加照片编号
                photoFrame.setAttribute('data-index', index);

                // 创建图片元素
                const img = document.createElement('img');
                let imgSrc = '';

                // 检查localStorage中是否有之前上传的照片
                if (localStorage.getItem(`heartPhoto${index}`)) {
                    imgSrc = localStorage.getItem(`heartPhoto${index}`);
                } else {
                    imgSrc = localDefaultPhotos[index] || localDefaultPhotos[0];
                }

                img.src = imgSrc;
                img.alt = `温新 ${index + 1}`;

                // 图片加载错误处理
                img.onerror = function() {
                    console.log(`图片 ${img.src} 加载失败，使用备用方案`);
                    // 创建简单的SVG图片替代
                    this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23ff6b8b"/><text x="50" y="50" font-family="Arial" font-size="14" fill="white" text-anchor="middle" dy=".3em">照片' + (index+1) + '</text></svg>';
                };

                photoFrame.appendChild(img);
                photosContainer.appendChild(photoFrame);

                // 存储图片数据用于放大查看
                photoData.push({
                    src: imgSrc,
                    alt: `温新 ${index + 1}`,
                    caption: `温新的照片 ${index + 1}`
                });

                // 添加点击事件 - 点击放大
                photoFrame.addEventListener('click', () => {
                    openPhotoModal(index);
                });
            });
        }

        // 创建雪花效果
        function createSnowflakes() {
            const snowflakesContainer = document.getElementById('snowflakes');
            const snowflakeCount = window.innerWidth <= 768 ? 30 : 50;

            for (let i = 0; i < snowflakeCount; i++) {
                const snowflake = document.createElement('div');
                snowflake.innerHTML = '❄';
                snowflake.style.position = 'absolute';
                snowflake.style.left = `${Math.random() * 100}vw`;
                snowflake.style.top = `${Math.random() * 100}vh`;
                snowflake.style.fontSize = `${Math.random() * 12 + 6}px`;
                snowflake.style.opacity = Math.random() * 0.7 + 0.3;
                snowflake.style.animation = `fall ${Math.random() * 5 + 3}s linear infinite`;
                snowflake.style.animationDelay = `${Math.random() * 5}s`;
                snowflake.style.zIndex = '1';
                snowflake.style.pointerEvents = 'none';

                snowflakesContainer.appendChild(snowflake);
            }

            // 添加自定义的下落动画
            if (!document.querySelector('#snowflake-animation')) {
                const style = document.createElement('style');
                style.id = 'snowflake-animation';
                style.textContent = `
                    @keyframes fall {
                        0% { transform: translateY(-100px) rotate(0deg); }
                        100% { transform: translateY(100vh) rotate(360deg); }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // 上传照片功能
        function setupPhotoUpload() {
            const uploadBtn = document.getElementById('uploadBtn');
            if (!uploadBtn) {
                console.error('上传按钮未找到');
                return;
            }

            uploadBtn.addEventListener('click', () => {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.multiple = true;

                fileInput.addEventListener('change', (e) => {
                    const files = e.target.files;
                    const photoFrames = document.querySelectorAll('.photo-frame');

                    let uploadedCount = 0;

                    Array.from(files).forEach((file, index) => {
                        if (index < photoFrames.length) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = photoFrames[index].querySelector('img');
                                img.src = event.target.result;

                                photoData[index].src = event.target.result;
                                photoData[index].caption = `上传的照片 ${index + 1}`;

                                localStorage.setItem(`heartPhoto${index}`, event.target.result);

                                uploadedCount++;

                                if (uploadedCount === Math.min(files.length, photoFrames.length)) {
                                    const msg = files.length < photoFrames.length
                                        ? `已成功上传 ${uploadedCount} 张照片！`
                                        : `已成功上传 ${uploadedCount} 张照片！`;
                                    alert(msg);
                                }
                            };
                            reader.readAsDataURL(file);
                        }
                    });

                    if (files.length > photoFrames.length) {
                        alert(`您选择了 ${files.length} 张照片，但爱心只能显示 ${photoFrames.length} 张。已使用前 ${photoFrames.length} 张照片。`);
                    }
                });

                fileInput.click();
            });
        }

        // 清空照片功能
        function setupClearPhotos() {
            const clearBtn = document.getElementById('clearBtn');
            if (!clearBtn) {
                console.error('清空按钮未找到');
                return;
            }

            clearBtn.addEventListener('click', () => {
                if (confirm('确定要清空所有照片吗？这将恢复为本地默认图片。')) {
                    for (let i = 0; i < 12; i++) {
                        localStorage.removeItem(`heartPhoto${i}`);
                    }

                    initHeartPhotos();
                    alert('照片已清空！已恢复为本地默认图片。');
                }
            });
        }

        // 保存页面功能
        function setupSavePage() {
            const saveBtn = document.getElementById('savePage');
            if (!saveBtn) {
                console.error('保存按钮未找到');
                return;
            }

            saveBtn.addEventListener('click', () => {
                const htmlContent = document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '圣诞快乐——温新.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('页面已保存！请将整个文件夹（包含index.html和images文件夹）发送给她。');
            });
        }

        // 音乐播放功能 - 修复版本
        function setupMusicPlayer() {
            const musicToggle = document.getElementById('musicToggle');
            const music = document.getElementById('christmasMusic');

            if (!musicToggle || !music) {
                console.error('音乐播放器元素未找到');
                return;
            }

            let isPlaying = false;

            musicToggle.addEventListener('click', function() {
                console.log('音乐按钮被点击');

                if (isPlaying) {
                    music.pause();
                    musicToggle.innerHTML = '<i class="fas fa-music"></i> 播放音乐';
                    isPlaying = false;
                } else {
                    // 尝试播放音乐
                    const playPromise = music.play();

                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            // 播放成功
                            musicToggle.innerHTML = '<i class="fas fa-pause"></i> 暂停音乐';
                            isPlaying = true;
                            console.log('音乐播放成功');
                        }).catch(error => {
                            // 播放失败
                            console.error('音乐播放失败:', error);
                            alert('音乐播放失败。请检查：\n1. 是否有1.mp3文件\n2. 浏览器是否允许自动播放\n3. 可以尝试刷新页面后再次点击');
                        });
                    }
                }
            });

            // 预加载音频，提高成功率
            music.load();
        }

        // 添加装饰品点击效果
        function setupOrnamentInteractions() {
            const ornaments = document.querySelectorAll('.ornament');
            ornaments.forEach(ornament => {
                ornament.addEventListener('click', function() {
                    const colors = ['#ff6b8b', '#ffcc00', '#00ccff', '#cc66ff', '#00ff99'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    this.style.backgroundColor = randomColor;
                    this.style.transform = 'scale(1.3)';

                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 300);
                });
            });
        }

        // 图片放大功能
        function openPhotoModal(index) {
            console.log('打开照片模态框，索引:', index);
            currentPhotoIndex = index;
            updateModalContent();
            photoModal.classList.add('active');
            document.body.style.overflow = 'hidden';

            // 添加键盘事件监听
            document.addEventListener('keydown', handleKeyboardNavigation);
        }

        function closePhotoModal() {
            console.log('关闭照片模态框');
            photoModal.classList.remove('active');
            document.body.style.overflow = 'auto';
            document.removeEventListener('keydown', handleKeyboardNavigation);
        }

        function updateModalContent() {
            if (photoData[currentPhotoIndex]) {
                modalImage.src = photoData[currentPhotoIndex].src;
                modalCaption.textContent = photoData[currentPhotoIndex].caption;
                modalIndex.textContent = `照片 ${currentPhotoIndex + 1} / ${photoData.length}`;
            }
        }

        function showNextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photoData.length;
            updateModalContent();
        }

        function showPrevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photoData.length) % photoData.length;
            updateModalContent();
        }

        function handleKeyboardNavigation(event) {
            switch(event.key) {
                case 'ArrowLeft':
                    showPrevPhoto();
                    break;
                case 'ArrowRight':
                    showNextPhoto();
                    break;
                case 'Escape':
                    closePhotoModal();
                    break;
            }
        }

        // 设置图片放大功能的事件监听
        function setupPhotoModal() {
            console.log('初始化图片模态框事件');

            // 确保按钮元素存在
            if (!closeModal || !prevBtn || !nextBtn) {
                console.error('模态框按钮元素未找到');
                return;
            }

            // 关闭模态框
            closeModal.addEventListener('click', function(e) {
                console.log('关闭按钮被点击');
                e.stopPropagation();
                closePhotoModal();
            });

            // 点击模态框背景关闭
            photoModal.addEventListener('click', function(e) {
                console.log('模态框背景被点击');
                if (e.target === photoModal) {
                    closePhotoModal();
                }
            });

            // 上一张/下一张按钮
            prevBtn.addEventListener('click', function(e) {
                console.log('上一张按钮被点击');
                e.stopPropagation();
                showPrevPhoto();
            });

            nextBtn.addEventListener('click', function(e) {
                console.log('下一张按钮被点击');
                e.stopPropagation();
                showNextPhoto();
            });

            // 阻止模态框内点击事件冒泡
            document.querySelector('.modal-content').addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 初始化所有功能
        try {
            initHeartPhotos();
            createSnowflakes();
            setupPhotoUpload();
            setupClearPhotos();
            setupSavePage();
            setupMusicPlayer();
            setupOrnamentInteractions();
            setupPhotoModal();

            // 添加窗口大小变化监听
            window.addEventListener('resize', debounce(() => {
                initHeartPhotos();
            }, 250));

            // 随机显示一条消息
            const messages = [
                "你是我最想要的圣诞礼物",
                "和你在一起的每一天都是节日",
                "愿我们的爱如圣诞星光般永恒",
                "这个圣诞节，我的心里只有你",
                "我的世界因你而完整"
            ];
            const subtitle = document.querySelector('.subtitle');
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            subtitle.textContent = randomMessage;

            console.log('页面初始化完成！');

            // 测试按钮是否存在
            console.log('测试按钮状态:');
            console.log('- 上传按钮:', document.getElementById('uploadBtn') ? '找到' : '未找到');
            console.log('- 音乐按钮:', document.getElementById('musicToggle') ? '找到' : '未找到');
            console.log('- 关闭按钮:', document.getElementById('closeModal') ? '找到' : '未找到');

        } catch (error) {
            console.error('初始化过程中出错:', error);
            alert('页面初始化出错，请刷新页面重试。错误信息: ' + error.message);
        }
    });
</script>
</body>
</html>
