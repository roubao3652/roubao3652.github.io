<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣诞快乐，温新</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2e38 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .snowflakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 20px 0 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff6b8b;
            text-shadow: 0 0 10px rgba(255, 107, 139, 0.7);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a8e6cf;
            margin-bottom: 15px;
        }

        .heart-icon {
            color: #ff6b8b;
            animation: heartbeat 1.5s infinite;
            margin: 0 8px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            margin: 20px auto 40px;
        }

        .tree-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-section {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tree-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tree {
            position: relative;
            width: 250px;
            height: 350px;
        }

        .tree-trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 60px;
            background: #8B4513;
            border-radius: 5px;
        }

        .tree-layer {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 100px solid #2e8b57;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tree-layer:nth-child(2) {
            bottom: 140px;
            border-bottom-color: #3cb371;
            border-left-width: 70px;
            border-right-width: 70px;
            border-bottom-width: 90px;
        }

        .tree-layer:nth-child(3) {
            bottom: 210px;
            border-bottom-color: #4caf50;
            border-left-width: 60px;
            border-right-width: 60px;
            border-bottom-width: 80px;
        }

        .tree-layer:nth-child(4) {
            bottom: 270px;
            border-bottom-color: #66bb6a;
            border-left-width: 50px;
            border-right-width: 50px;
            border-bottom-width: 70px;
        }

        .tree-star {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            color: gold;
            font-size: 3rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        .ornament {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: red;
            z-index: 5;
            animation: twinkle 2s infinite;
            cursor: pointer;
        }

        .ornament:nth-child(5) { top: 50px; left: 50%; background: #ff6b8b; animation-delay: 0.2s; }
        .ornament:nth-child(6) { top: 100px; left: 40%; background: #ffcc00; animation-delay: 0.5s; }
        .ornament:nth-child(7) { top: 100px; right: 40%; background: #00ccff; animation-delay: 0.8s; }
        .ornament:nth-child(8) { top: 160px; left: 45%; background: #ff6b8b; animation-delay: 1.1s; }
        .ornament:nth-child(9) { top: 160px; right: 45%; background: #cc66ff; animation-delay: 1.4s; }
        .ornament:nth-child(10) { top: 220px; left: 50%; background: #00ff99; animation-delay: 1.7s; }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        .heart-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-shape {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.2;
        }

        .heart-shape:before,
        .heart-shape:after {
            position: absolute;
            content: "";
            left: 200px;
            top: 0;
            width: 200px;
            height: 320px;
            background: rgba(255, 107, 139, 0.2);
            border-radius: 200px 200px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-shape:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .photo-frame {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 107, 139, 0.9);
            transition: all 0.4s ease;
            z-index: 5;
            transform-origin: center;
        }

        .photo-frame:hover {
            transform: scale(1.3);
            z-index: 20;
            box-shadow: 0 0 25px rgba(255, 107, 139, 1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .photo-frame:hover img {
            transform: scale(1.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 40px;
            flex-wrap: wrap;
            position: relative;
            z-index: 100;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .btn-upload {
            background: linear-gradient(to right, #ff6b8b, #ff8e53);
            color: white;
        }

        .btn-save {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }

        .btn-music {
            background: linear-gradient(to right, #9d50bb, #6e48aa);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin: 20px auto 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .message-box h2 {
            color: #a8e6cf;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .message-content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0f7fa;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .signature {
            text-align: right;
            margin-top: 15px;
            font-style: italic;
            color: #ffccbc;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #a8e6cf;
            font-size: 0.9rem;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instructions {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 响应式设计 - 针对小屏幕手机优化 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
                max-width: 100%;
                overflow-x: hidden;
            }

            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
                padding: 0 10px;
            }

            .main-content {
                flex-direction: column;
                gap: 30px;
                margin: 10px auto 20px;
            }

            .tree {
                width: 180px;
                height: 250px;
            }

            .tree-layer {
                border-left-width: 55px;
                border-right-width: 55px;
                border-bottom-width: 75px;
            }

            .tree-layer:nth-child(2) {
                bottom: 110px;
                border-left-width: 45px;
                border-right-width: 45px;
                border-bottom-width: 65px;
            }

            .tree-layer:nth-child(3) {
                bottom: 160px;
                border-left-width: 35px;
                border-right-width: 35px;
                border-bottom-width: 55px;
            }

            .tree-layer:nth-child(4) {
                bottom: 210px;
                border-left-width: 25px;
                border-right-width: 25px;
                border-bottom-width: 45px;
            }

            .tree-star {
                font-size: 2.2rem;
            }

            .heart-container {
                width: 320px;
                height: 300px;
                margin: 0 auto;
            }

            .heart-shape:before,
            .heart-shape:after {
                left: 160px;
                width: 160px;
                height: 250px;
            }

            .photo-frame {
                width: 55px;
                height: 55px;
                border-width: 2px;
            }

            /* 调整爱心形状照片位置，使其更紧凑 */
            #photosContainer {
                transform: scale(0.9);
                transform-origin: center;
            }

            .controls {
                margin: 20px 0 30px;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding-top: 20px;
                position: relative;
                z-index: 100;
            }

            .btn {
                width: 90%;
                max-width: 300px;
                justify-content: center;
                padding: 10px 20px;
                font-size: 0.95rem;
            }

            .message-box {
                padding: 20px 15px;
                margin: 15px auto 20px;
            }

            .message-box h2 {
                font-size: 1.5rem;
            }

            .message-content {
                font-size: 1rem;
            }
        }

        /* 针对超小屏幕手机（iPhone SE等） */
        @media (max-width: 375px) {
            h1 {
                font-size: 1.6rem;
            }

            .heart-container {
                width: 280px;
                height: 260px;
            }

            .heart-shape:before,
            .heart-shape:after {
                left: 140px;
                width: 140px;
                height: 220px;
            }

            .photo-frame {
                width: 48px;
                height: 48px;
            }

            #photosContainer {
                transform: scale(0.8);
            }

            .tree {
                width: 160px;
                height: 220px;
            }

            .tree-layer {
                border-left-width: 50px;
                border-right-width: 50px;
                border-bottom-width: 70px;
            }

            .tree-layer:nth-child(2) {
                border-left-width: 40px;
                border-right-width: 40px;
                border-bottom-width: 60px;
            }

            .tree-layer:nth-child(3) {
                border-left-width: 30px;
                border-right-width: 30px;
                border-bottom-width: 50px;
            }

            .tree-layer:nth-child(4) {
                border-left-width: 20px;
                border-right-width: 20px;
                border-bottom-width: 40px;
            }
        }

        /* 针对横屏模式 */
        @media (max-height: 600px) and (orientation: landscape) {
            .container {
                padding: 10px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .main-content {
                margin: 10px auto;
            }

            .controls {
                margin: 10px 0 15px;
            }

            .message-box {
                margin: 10px auto 15px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<!-- 雪花效果 -->
<div class="snowflakes" id="snowflakes"></div>

<div class="container">
    <header>
        <h1>圣诞快乐，温新 <i class="fas fa-heart heart-icon"></i></h1>

    <div class="main-content">

                <div class="tree">
                    <div class="tree-trunk"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="tree-layer"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="ornament"></div>
                    <div class="tree-star">

            <p>你就像我生命中的圣诞礼物，每一天都带给我惊喜与快乐。和你在一起的每一刻，都如同圣诞树上闪烁的灯光，照亮我的世界。</p>
            <p>愿这个圣诞节，我们的爱如圣诞树般常青，如星光般永恒。未来的每一个圣诞节，我都希望与你一同度过。</p>
            <p>你是我最想要的圣诞礼物，是我生命中最美的奇迹。</p>

</div>

<!-- 音频播放器（隐藏） -->
<audio id="christmasMusic" loop>
    <source src="https://er-sycdn.kuwo.cn/3789f4df2b04f60960ff357d020d35c6/694d511d/resource/30106/trackmedia/M500002x38D701hpE5.mp3" type="audio/mpeg">
</audio>

<script>
    // 爱心形状位置计算
    function calculateHeartPositions(numPhotos, containerWidth, containerHeight) {
        const positions = [];
        const centerX = containerWidth / 2; // 爱心中心X坐标（动态计算）
        const centerY = containerHeight / 2; // 爱心中心Y坐标（动态计算）
        
        // 根据容器大小动态调整爱心大小
        const scale = Math.min(containerWidth, containerHeight) * 0.35;

        for (let i = 0; i < numPhotos; i++) {
            // 爱心参数方程
            const t = (i / numPhotos) * 2 * Math.PI;

            // 经典心形线方程
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

            // 缩放和调整位置
            const scaledX = centerX - x * (scale / 16);
            const scaledY = centerY - y * (scale / 16);

            positions.push({
                x: scaledX,
                y: scaledY
            });
        }

        return positions;
    }

    // 本地默认图片文件名（在images文件夹中）
    const localDefaultPhotos = [
        'images/1.jpg',   // 图片1
        'images/2.jpg',   // 图片2
        'images/3.jpg',   // 图片3
        'images/4.jpg',   // 图片4
        'images/5.jpg',   // 图片5
        'images/6.jpg',   // 图片6
        'images/7.jpg',   // 图片7
        'images/8.jpg',   // 图片8
        'images/9.jpg',   // 图片9
        'images/10.jpg',  // 图片10
        'images/11.jpg',  // 图片11
        'images/12.jpg'   // 图片12
    ];

    // 初始化爱心照片位置
    function initHeartPhotos() {
        const photosContainer = document.getElementById('photosContainer');
        const heartContainer = document.querySelector('.heart-container');
        
        // 获取容器实际尺寸
        const containerWidth = heartContainer.offsetWidth;
        const containerHeight = heartContainer.offsetHeight;
        
        // 根据容器尺寸计算位置
        const heartPositions = calculateHeartPositions(12, containerWidth, containerHeight);

        // 清除现有的照片
        photosContainer.innerHTML = '';

        // 根据屏幕宽度动态调整照片框大小
        const isMobile = window.innerWidth <= 768;
        const photoSize = isMobile ? (window.innerWidth <= 375 ? 48 : 55) : 80;
        const photoOffset = photoSize / 2;

        // 添加照片框
        heartPositions.forEach((pos, index) => {
            const photoFrame = document.createElement('div');
            photoFrame.className = 'photo-frame';
            photoFrame.style.width = `${photoSize}px`;
            photoFrame.style.height = `${photoSize}px`;
            photoFrame.style.left = `${pos.x - photoOffset}px`;
            photoFrame.style.top = `${pos.y - photoOffset}px`;

            // 添加照片编号
            photoFrame.setAttribute('data-index', index);

            // 创建图片元素
            const img = document.createElement('img');

            // 检查localStorage中是否有之前上传的照片（用于刷新后保持）
            if (localStorage.getItem(`heartPhoto${index}`)) {
                // 如果localStorage中有上传的图片数据，使用它
                img.src = localStorage.getItem(`heartPhoto${index}`);
            } else {
                // 使用本地默认图片（相对路径）
                const imgPath = localDefaultPhotos[index] || localDefaultPhotos[0];
                img.src = imgPath;
            }

            img.alt = `温新 ${index + 1}`;
            img.onerror = function() {
                // 如果本地图片加载失败，尝试使用网络备用图片
                console.error(`本地图片 ${img.src} 加载失败，尝试使用网络图片`);
                this.src = `https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80&t=${Date.now() + index}`;
            };

            photoFrame.appendChild(img);
            photosContainer.appendChild(photoFrame);
        });
    }

    // 创建雪花效果
    function createSnowflakes() {
        const snowflakesContainer = document.getElementById('snowflakes');
        const snowflakeCount = window.innerWidth <= 768 ? 30 : 50;

        for (let i = 0; i < snowflakeCount; i++) {
            const snowflake = document.createElement('div');
            snowflake.innerHTML = '❄';
            snowflake.style.position = 'absolute';
            snowflake.style.left = `${Math.random() * 100}vw`;
            snowflake.style.top = `${Math.random() * 100}vh`;
            snowflake.style.fontSize = `${Math.random() * 12 + 6}px`;
            snowflake.style.opacity = Math.random() * 0.7 + 0.3;
            snowflake.style.animation = `fall ${Math.random() * 5 + 3}s linear infinite`;
            snowflake.style.animationDelay = `${Math.random() * 5}s`;
            snowflake.style.zIndex = '1';
            snowflake.style.pointerEvents = 'none';

            snowflakesContainer.appendChild(snowflake);
        }

        // 添加自定义的下落动画
        if (!document.querySelector('#snowflake-animation')) {
            const style = document.createElement('style');
            style.id = 'snowflake-animation';
            style.textContent = `
                @keyframes fall {
                    0% {
                        transform: translateY(-100px) rotate(0deg);
                    }
                    100% {
                        transform: translateY(100vh) rotate(360deg);
                    }
                }
            `;
            document.head.appendChild(style);
        }
    }

    // 上传照片功能 - 支持多选
    function setupPhotoUpload() {
        const uploadBtn = document.getElementById('uploadBtn');
        uploadBtn.addEventListener('click', () => {
            // 创建文件输入元素
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.multiple = true;

            fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                const photoFrames = document.querySelectorAll('.photo-frame');

                // 统计已上传照片数量
                let uploadedCount = 0;

                // 更新每个照片框
                Array.from(files).forEach((file, index) => {
                    if (index < photoFrames.length) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const img = photoFrames[index].querySelector('img');
                            img.src = event.target.result;

                            // 保存到本地存储（用于刷新后保持）
                            localStorage.setItem(`heartPhoto${index}`, event.target.result);

                            uploadedCount++;

                            // 如果所有选中的照片都已处理完成
                            if (uploadedCount === Math.min(files.length, photoFrames.length)) {
                                const msg = files.length < photoFrames.length
                                    ? `已成功上传 ${uploadedCount} 张照片！爱心照片墙已更新。`
                                    : `已成功上传 ${uploadedCount} 张照片！爱心照片墙已填满。`;
                                alert(msg);
                            }
                        };
                        reader.readAsDataURL(file);
                    }
                });

                // 如果选中的照片多于爱心位置
                if (files.length > photoFrames.length) {
                    alert(`您选择了 ${files.length} 张照片，但爱心只能显示 ${photoFrames.length} 张。已使用前 ${photoFrames.length} 张照片。`);
                }
            });

            fileInput.click();
        });
    }

    // 清空照片功能
    function setupClearPhotos() {
        const clearBtn = document.getElementById('clearBtn');
        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清空所有照片吗？这将恢复为本地默认图片。')) {
                // 清除本地存储中的照片
                for (let i = 0; i < 12; i++) {
                    localStorage.removeItem(`heartPhoto${i}`);
                }

                // 重新初始化照片
                initHeartPhotos();
                alert('照片已清空！已恢复为本地默认图片。');
            }
        });
    }

    // 保存页面功能
    function setupSavePage() {
        const saveBtn = document.getElementById('savePage');
        saveBtn.addEventListener('click', () => {
            // 创建一个包含当前页面HTML的Blob
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });

            // 创建一个下载链接
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '圣诞快乐——温新.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert('页面已保存！注意：保存的HTML文件需要和images文件夹一起使用。请将整个文件夹（包含index.html和images文件夹）发送给她。');
        });
    }

    // 音乐播放功能
    function setupMusicPlayer() {
        const musicToggle = document.getElementById('musicToggle');
        const music = document.getElementById('christmasMusic');
        let isPlaying = false;

        musicToggle.addEventListener('click', () => {
            if (isPlaying) {
                music.pause();
                musicToggle.innerHTML = '<i class="fas fa-music"></i> 播放音乐';
            } else {
                music.play().catch(e => {
                    alert('音乐播放失败：' + e.message);
                });
                musicToggle.innerHTML = '<i class="fas fa-pause"></i> 暂停音乐';
            }
            isPlaying = !isPlaying;
        });
    }

    // 添加装饰品点击效果
    function setupOrnamentInteractions() {
        document.addEventListener('DOMContentLoaded', () => {
            const ornaments = document.querySelectorAll('.ornament');
            ornaments.forEach(ornament => {
                ornament.addEventListener('click', function() {
                    const colors = ['#ff6b8b', '#ffcc00', '#00ccff', '#cc66ff', '#00ff99'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    this.style.backgroundColor = randomColor;
                    this.style.transform = 'scale(1.3)';

                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 300);
                });
            });
        });
    }

    // 防抖函数，防止resize事件频繁触发
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    // 窗口大小变化时重新计算照片位置
    const handleResize = debounce(() => {
        initHeartPhotos();
    }, 250);

    // 初始化页面
    document.addEventListener('DOMContentLoaded', () => {
        initHeartPhotos();
        createSnowflakes();
        setupPhotoUpload();
        setupClearPhotos();
        setupSavePage();
        setupMusicPlayer();
        setupOrnamentInteractions();

        // 添加窗口大小变化监听
        window.addEventListener('resize', handleResize);

        // 添加一些初始的浪漫消息
        const messages = [
            "你是我最想要的圣诞礼物",
            "和你在一起的每一天都是节日",
            "愿我们的爱如圣诞星光般永恒",
            "这个圣诞节，我的心里只有你",
            "我的世界因你而完整"
        ];

        // 随机显示一条消息在标题下方
        const subtitle = document.querySelector('.subtitle');
        const randomMessage = messages[Math.floor(Math.random() * messages.length)];
        subtitle.textContent = randomMessage;

        console.log("页面已加载！这是一个专为你的爱人准备的。");
    });
</script>
</body>
</html>
